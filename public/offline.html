<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline — 365 MotorSales</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
        background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%);
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 440px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 32px 24px;
        backdrop-filter: blur(8px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 20px;
        opacity: 0.85;
        line-height: 1.5;
      }
      button {
        background: #f8fafc;
        color: #0f172a;
        border: 0;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
      }
      .logo {
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">365 MotorSales</div>
      <h1>You're offline</h1>
      <p>It looks like you've lost your internet connection. Check your network and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
