<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 840" role="img" aria-label="Acceleration Pedal Sensor — back (placeholder)">
  <rect width="600" height="840" rx="20" fill="#ffffff" stroke="#cdd6e0" stroke-width="2"/>
  <rect x="0" y="0" width="600" height="64" fill="#1d2733"/>
  <path d="M540 0 H580 Q600 0 600 20 V64 H540 Z" fill="#d11f2a"/>
  <text x="28" y="42" font-family="Arial,sans-serif" font-size="26" font-weight="900" fill="#fff">CARD — BACK</text>
  <text x="565" y="44" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="end">K</text>
  <text x="300" y="112" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#1c4e80" text-anchor="middle">ACCELERATION PEDAL SENSOR</text>
  <text x="300" y="150" font-family="Arial,sans-serif" font-size="15" fill="#28415c" text-anchor="middle">Detects the driver's pedal position and signals the ECU,</text>
  <text x="300" y="172" font-family="Arial,sans-serif" font-size="15" fill="#28415c" text-anchor="middle">which controls throttle, engine power, and transmission.</text>
  <rect x="40" y="210" width="520" height="40" rx="8" fill="#1c4e80"/>
  <text x="300" y="237" font-family="Arial,sans-serif" font-size="16" font-weight="800" fill="#fff" text-anchor="middle">HOW IT WORKS</text>
  <g font-family="Arial,sans-serif" text-anchor="middle">
    <rect x="40" y="266" width="120" height="120" rx="10" fill="#f4f7fa" stroke="#cdd6e0"/>
    <text x="100" y="320" font-size="13" font-weight="800" fill="#1c4e80">1</text>
    <text x="100" y="344" font-size="11" fill="#46566b">Pedal pressed</text>
    <rect x="173" y="266" width="120" height="120" rx="10" fill="#f4f7fa" stroke="#cdd6e0"/>
    <text x="233" y="320" font-size="13" font-weight="800" fill="#1c4e80">2</text>
    <text x="233" y="344" font-size="11" fill="#46566b">Sensor reads pos.</text>
    <rect x="306" y="266" width="120" height="120" rx="10" fill="#f4f7fa" stroke="#cdd6e0"/>
    <text x="366" y="320" font-size="13" font-weight="800" fill="#1c4e80">3</text>
    <text x="366" y="344" font-size="11" fill="#46566b">Volt signal to ECU</text>
    <rect x="439" y="266" width="120" height="120" rx="10" fill="#f4f7fa" stroke="#cdd6e0"/>
    <text x="499" y="320" font-size="13" font-weight="800" fill="#1c4e80">4</text>
    <text x="499" y="344" font-size="11" fill="#46566b">ECU adjusts power</text>
  </g>
  <rect x="40" y="420" width="250" height="170" rx="10" fill="#f0f8f2" stroke="#bfe6cf"/>
  <text x="58" y="450" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#14663a">SYMPTOMS OF FAILURE</text>
  <text x="58" y="478" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Poor acceleration / hesitation</text>
  <text x="58" y="500" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Check engine light (DTCs)</text>
  <text x="58" y="522" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Limp mode / reduced power</text>
  <text x="58" y="544" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Erratic engine speed</text>
  <rect x="310" y="420" width="250" height="170" rx="10" fill="#fdeef0" stroke="#f5c6c0"/>
  <text x="328" y="450" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#9c121b">DIAGNOSTIC TIPS</text>
  <text x="328" y="478" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Scan for related DTCs</text>
  <text x="328" y="500" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Check 5V ref, ground, signal</text>
  <text x="328" y="522" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Monitor APP voltage w/ scan tool</text>
  <text x="328" y="544" font-family="Arial,sans-serif" font-size="12.5" fill="#2b3a4d">• Inspect connector &amp; wiring</text>
  <text x="300" y="640" font-family="Arial,sans-serif" font-size="13" fill="#cc7a00" text-anchor="middle" font-weight="700">CAUTION: a faulty APP sensor can affect drivability &amp; safety systems.</text>
  <text x="300" y="800" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#90a0b0" text-anchor="middle">365 MOTOR SALES · ENGINE TRAINING — PLACEHOLDER (replace -back art)</text>
</svg>
